---
- name: provision workstation
  hosts: localhost
  gather_facts: true

  pre_tasks:
    - name: Set lid close behaviour
      ansible.builtin.lineinfile:
        path: "/etc/systemd/logind.conf"
        line: "HandleLidSwitch=lock"
      become: true
      when: ansible_distribution == 'Ubuntu'
    - name: Set log max size
      ansible.builtin.lineinfile:
        path: "/etc/systemd/journald.conf"
        regexp: "^SystemMaxUse="
        line: "SystemMaxUse=50M"
      notify:
        - Restart journald
      become: true
      when: ansible_distribution == 'Ubuntu'
    # to fetch all dependencies and perform switch
    - ansible.builtin.import_role:
        name: nixos
      tags: nixos
      when: ansible_distribution == 'NixOS'
  handlers:
    - name: Restart journald
      ansible.builtin.service:
        name: systemd-journald
        state: restarted
      become: true

  roles:
    - role: packages
      vars:
        packages_nix_flake_path: "{{ playbook_dir }}/toolbox-flake"
