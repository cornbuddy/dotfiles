---
- name: Install nix
  ansible.builtin.import_tasks: nix.yml
  tags: nix

- name: Configure software
  # I cannot use loops with import_tasks
  ansible.builtin.include_tasks: "{{ file }}.yml"
  loop:
    - alacritty
    - fish
    - git
    - go
    - hledger
    - nvim
    - tmux
  loop_control:
    loop_var: file

- name: Install fonts
  ansible.builtin.import_tasks: fonts.yml
  when: packages_fonts_install | bool
