---
- name: Nix role
  ansible.builtin.import_role:
    name: danielrolls.nix
  vars:
    flakes: "{{ packages_nix_flakes }}"
  when: packages_nix_install | bool
  become: true

- name: Install flake
  ansible.builtin.shell: >-
    nix profile install {{ packages_nix_flake_path }}
  environment:
    HOME: "{{ lookup('env', 'HOME') }}"
  when: packages_nix_flake_path is defined
