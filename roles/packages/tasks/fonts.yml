---
- name: Ensure fonst directory exists
  ansible.builtin.stat:
    path: "{{ packages_fonts_dir }}"
  register: fonts

- name: Checkout fonts repo
  ansible.builtin.git:
    dest: "{{ packages_fonts_dir }}"
    repo: "{{ packages_fonts_url }}"
    version: master
    depth: 1
  when: >-
    (packages_fonts_install | bool)
    or not fonts.stat.exists

- name: Install fonts
  ansible.builtin.shell: ./install.sh
  args:
    chdir: "{{ packages_fonts_dir }}"
  notify:
    - Update font cache
